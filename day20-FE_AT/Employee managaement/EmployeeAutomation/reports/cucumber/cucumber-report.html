window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"24.1.0","implementation":{"name":"cucumber-jvm","version":"7.18.1"},"runtime":{"name":"Java HotSpot(TM) 64-Bit Server VM","version":"17.0.12+8-LTS-286"},"os":{"name":"Windows 11"},"cpu":{"name":"amd64"}}},{"testRunStarted":{"timestamp":{"seconds":1784367073,"nanos":163461500}}},{"source":{"uri":"file:\/\/\/E:\/html%20placement\/Employee%20managaement\/EmployeeAutomation\/src\/test\/resources\/features\/employee_add.feature","data":"# ===========================================================\n# Feature: Add Employee\n# Covers: Add Employee (UI), API Verification, Count, Data-Driven\n# ===========================================================\n\n@EmployeeModule @AddEmployee\nFeature: Add Employee\n\n  Background:\n    Given I am logged in as admin\n    And I navigate to the Employee page\n\n  @AddEmployee @smoke\n  Scenario: Add Employee with valid data and verify in UI\n    Given I record the current employee count via API\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    Then the modal should close\n    And the employee should appear in the list\n\n  @AddEmployee @API\n  Scenario: Add Employee and verify via GET API\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    Then the API should confirm the employee exists\n\n  @AddEmployee @API\n  Scenario: Add Employee and verify employee count increases via API\n    Given I record the current employee count via API\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    Then the employee count should increase by one\n\n  @AddEmployee @API\n  Scenario: Verify GET employees API returns status 200\n    Then the GET employees API should return status 200\n\n  @AddEmployee @API\n  Scenario: Verify GET employees API response time is acceptable\n    Then the GET employees API response time should be acceptable\n\n  @AddEmployee @smoke\n  Scenario: Add Employee with specific form data\n    When I click Add Employee button\n    And I fill the employee form with data:\n      | name        | John Test Smith               |\n      | email       | john.test.{ts}@company.com    |\n      | phone       | 9876543210                    |\n      | department  | IT                            |\n      | designation | Software Engineer             |\n      | gender      | Male                          |\n      | salary      | 75000                         |\n      | joiningDate | 2024-03-01                    |\n    And I submit the employee form\n    Then the modal should close\n    And the employee should appear in the list\n\n  @AddEmployee @DataDriven\n  Scenario: Add multiple employees from Excel data\n    When I add employees from Excel file\n    Then the employee count label should be correct\n\n  @AddEmployee @Verified\n  Scenario: Verify employee added successfully toast and UI refresh\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    Then the employee should appear in the list\n    And the API should confirm the employee exists\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/E:\/html%20placement\/Employee%20managaement\/EmployeeAutomation\/src\/test\/resources\/features\/employee_add.feature","feature":{"location":{"line":7,"column":1},"tags":[{"location":{"line":6,"column":1},"name":"@EmployeeModule","id":"0535b5aa-1574-4125-bd76-811cb2a2742b"},{"location":{"line":6,"column":17},"name":"@AddEmployee","id":"7856e5b3-fe12-4e31-898a-8712e2b05a54"}],"language":"en","keyword":"Feature","name":"Add Employee","description":"","children":[{"background":{"location":{"line":9,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":10,"column":5},"keyword":"Given ","key  Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    Then the employee should appear in the list\n    When I click delete for the last added employee\n    And I confirm the delete action\n    Then the employee should no longer appear in the list\n\n  @DeleteEmployee @API\n  Scenario: Delete Employee and verify removal via API\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    When I click delete for the last added employee\n    And I confirm the delete action\n    Then the API should confirm the employee is deleted\n\n  @DeleteEmployee @API\n  Scenario: Delete Employee and verify count decreases via API\n    Given I record the current employee count via API\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    When I click delete for the last added employee\n    And I confirm the delete action\n    Then the employee count should decrease by one\n\n  @DeleteEmployee\n  Scenario: Verify Employee Deleted Successfully confirmation\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    When I click delete for the last added employee\n    And I confirm the delete action\n    Then the employee should no longer appear in the list\n    And the API should confirm the employee is deleted\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/E:\/html%20placement\/Employee%20managaement\/EmployeeAutomation\/src\/test\/resources\/features\/employee_delete.feature","feature":{"location":{"line":7,"column":1},"tags":[{"location":{"line":6,"column":1},"name":"@EmployeeModule","id":"5a814111-2316-4eec-8286-9c1a0582ae59"},{"location":{"line":6,"column":17},"name":"@DeleteEmployee","id":"8e130193-a46f-459c-ad28-f1fe14b746ae"}],"language":"en","keyword":"Feature","name":"D n\n    And I navigate to the Employee page\n\n  @SearchEmployee @smoke\n  Scenario: Search Employee by name\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    When I search for the added employee by name\n    Then the employee should appear in search results\n\n  @SearchEmployee @smoke\n  Scenario: Search Employee by email\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    When I search for the added employee by email\n    Then the employee should appear in search results\n\n  @SearchEmployee\n  Scenario: Search Employee by ID\n    When I click Add Employee button\n    And I fill the employee form with valid data\n    And I submit the employee form\n    When I search for the added employee by email\n    Then the employee should appear in search results\n\n  @SearchEmployee\n  Scenario: Search with a non-existent term shows no results\n    When I search for \"ZZZ_NONEXISTENT_EMPLOYEE_9999\"\n    Then no employee should be displayed\n\n  @SearchEmployee\n  Scenario: Clear search restores all employees\n    When I search for \"ZZZ_NONEXISTENT_EMPLOYEE_9999\"\n    Then no employee should be displayed\n    When I clear the search\n    Then the employee count label should be correct\n\n  @SearchEmployee\n  Scenario: Verify Employee Details on detail page\n    When I click Add Employee button\n    And I fill the employee form with data:\n      | name        | Detail Verify Employee        |\n      | email       | detail.verify.{ts}@test.com   |\n      | phone       | 9876543210                    |\n      | department  | IT                            |\n      | designation | QA Engineer                   |\n      | gender      | Male                          |\n      | salary      | 60000                         |\n      | joiningDate | 2024-06-01                    |\n    And I submit the employee form\n    Then I view Email validation — missing @\n    When I fill the employee form with data:\n      | name        | Invalid Email Test |\n      | email       | invalidemail.com   |\n      | phone       | 9876543210         |\n      | department  | IT                 |\n      | designation | Tester             |\n      | gender      | Male               |\n      | salary      | 50000              |\n      | joiningDate | 2024-01-01         |\n    And I submit the employee form\n    Then I should see validation error messages\n    And the modal should remain open\n\n  @Validation @InvalidEmail\n  Scenario: Verify Invalid Email validation — missing domain\n    When I fill the employee form with data:\n      | name        | Invalid Email Test2 |\n      | email       | user@               |\n      | phone       | 9876543210          |\n      | department  | IT                  |\n      | designation | Tester              |\n      | gender      | Male                |\n      | salary      | 50000               |\n      | joiningDate | 2024-01-01          |\n    And I submit the employee form\n    Then I should see validation error messages\n    And the modal should remain open\n\n  @Validation @InvalidPhone\n  Scenario: Verify Invalid Phone Number validation — letters\n    When I fill the employee form with data:\n      | name        | Invalid Phone Test |\n      | email       | validphone@test.com|\n      | phone       | ABCDEFGHIJ         |\n      | department  | IT                 |\n      | designation | Tester             |\n      | gender      | Male               |\n      | salary      | 50000              |\n      | joiningDate | 2024-01-01         |\n    And I submit the employee form\n    Then I should see validation error messages\n    And the modal should remain open\n\n  @Validation @InvalidPhone\n  Scenario: Verify Invalid Phone Number validation — too short\n    When I fill the employee form with data:\n      | name        | Short Phone Test   |\n      | email       | shortphone@test.com|\n      | phone       | 12345              |\n      | department  | IT                 |\n      | designation | Tester             |\n      | gender      | Male               |\n      | salary      | 50000              |\n      | joiningDate | 2024-01-01         |\n    And I submit the employee form\n    Then I should see validation error messages\n    And the modal should remain open\n\n  @Validation @SalaryValidation\n  Scenario: Verify Salary Validation — negative value\n    When I fill the employee form with data:\n      | name        | Neg Salary Test    |\n      | email       | negsalary@test.com |\n      | phone       | 9876543210         |\n      | department  | IT                 |\n      | designation | Tester             |\n      | gender      | Male               |\n      | salary      | -5000              |\n      | joiningDate | 2024-01-01         |\n    And I submit the employee form\n    Then I should see validation error messages\n    And the modal should remain open\n\n  @Validation @SalaryValidation\n  Scenario: Verify Salary Validation — zero value\n    When I fill the employee form with data:\n      | name        | Zero Salary Test   |\n      | email       | zerosalary@test.com|\n      | phone       | 9876543210         |\n      | department  | IT                 |\n      | designation | Tester             |\n      | gender      | Male               |\n      | salary      | 0                  |\n      | joiningDate | 2024-01-01         |\n    And I submit the employee form\n    Then I should see validation error messages\n    And the modal should remain open\n\n  @Validation @DepartmentDropdown\n  Scenario: Verify Department Dropdown has options\n    Then the department dropdown should have options\n\n  @Validation @GenderDropdown\n  Scenario: Verify Gender Selection contains Male Female Other\n    Then the gender dropdown should contain Male, Female, Other\n\n  @Validation @DuplicatePrevention\n  Scenario: Verify Duplicate Employee Prevention\n    When I fill the employee form with data:\n      | name        | Duplicate Employee |\n      | email       | rakesh@gmail.com   |\n      | phone       | 9876543210         |\n      | department  | IT                 |\n      | designation | Tester             |\n      | gender      | Male               |\n      | salary      | 50000              |\n      | joiningDate | 2024-01-01         |\n    And I submit the employee form\n    Then the modal should remain open\n\n  @Validation @smoke\n  Scenario: Valid form submission closes the modal\n    When I fill the employee form with data:\n      | name        | Valid Employee Test         |\n      | email       | valid.test.{ts}@company.com |\n      | phone       | 9876543210                  |\n      | department  | IT                          |\n      | designation | Engineer                    |\n      | gender      | Female                      |\n      | salary      | 65000                       |\n      | joiningDate | 2024-05-15                  |\n    And I submit the employee form\n    Then the modal should close\n    And the employee should appear in the list\n\n  @Validation @Count\n  Scenario: Verify Employee Count matches API\n    Then the employee count label should be correct\n\n  @Validation @Pagination\n  Scenario: Verify Pagination is displayed when many employees exist\n    Then the employee count label should be correct\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/E:\/html%20placement\/Employee%20managaement\/EmployeeAutomation\/src\/test\/resources\/features\/employee_validation.feature","feature":{"location":{"line":8,"column":1},"tags":[{"location":{"line":7,"column":1},"name":"@EmployeeModule","id":"7e9051f3-0d73-43ce-8d91-55b75ddd4264"},{"location":{"line":7,"column":17},"name":"@Validation","id":"441673c8-e740-4c19-8aae-9e9dc2c55513"}],"language":"en","keyword":"Feature","name":"Employee Form Validation","description":"","children":[{"b
